name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]  # If your default branch is 'master', change this to 'master'

# Allow the job to push to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Uses Node 20 for stability

      - name: Install dependencies
        run: npm install

      - name: Build Project
        # This uses the script we added to your package.json
        run: npm run build:prod

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # IMPORTANT: Verify if your dist folder is 'portfolio-website' (lowercase)
          # or 'Portfolio-Website'. Angular usually lowercases this.
          path: dist/portfolio-website/browser

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
